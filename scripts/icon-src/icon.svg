<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="premium-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#premium-bg)"/>
  
  <!-- Subtle inner border -->
  <rect x="20" y="20" width="984" height="984" rx="180" fill="none" stroke="url(#gold-gradient)" stroke-width="2" opacity="0.3"/>

  <!-- Tooth Logo -->
  <g transform="translate(512 512) scale(0.9)">
    <path fill="url(#gold-gradient)" filter="url(#glow)" d="
      M -150 -250
      C -220 -250 -280 -200 -280 -120
      L -250 150
      C -240 250 -200 320 -150 340
      C -110 355 -80 320 -70 260
      L -50 100
      C -45 60 -25 45 0 45
      C 25 45 45 60 50 100
      L 70 260
      C 80 320 110 355 150 340
      C 200 320 240 250 250 150
      L 280 -120
      C 280 -200 220 -250 150 -250
      C 100 -250 60 -220 0 -220
      C -60 -220 -100 -250 -150 -250
      Z
    "/>
    <!-- Shine highlight on the tooth -->
    <path fill="#FFFFFF" opacity="0.4" d="
      M -130 -210
      C -180 -210 -220 -180 -220 -120
      L -205 50
      C -200 100 -180 130 -160 140
      L -165 -100
      C -165 -150 -150 -180 -130 -210
      Z
    "/>
  </g>
</svg>
